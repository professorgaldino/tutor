<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Tutor 2</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 25px;
}

.logo {
  width: 130px;
  margin-bottom: 10px;
}

h1 {
  color: #1f2937;
}

/* LOGIN */
.login-box {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

label {
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
}

.input-group {
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

input:focus {
  border-color: #4f46e5;
}

/* SENHA */
.senha-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.toggle-senha {
  background: #f3f4f6;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: 0.2s;
}

.toggle-senha:hover {
  background: #e5e7eb;
}

/* BOTÃO */
button.login {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4f46e5;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button.login:hover {
  background: #4338ca;
}

/* PORTAL */
#portal {
  display: none;
}

#titulo {
  text-align: center;
  margin: 20px 0;
  text-transform: uppercase;
}

/* CHIP */
.tutor-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  padding: 8px 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
}

/* LOADING OVERLAY */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(6px);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  font-size: 18px;
  font-weight: 600;
  color: #1f2937;
}
</style>
</head>

<body>

<div id="loading">Carregando seus tutorados, aguarde...</div>

<div class="container">

<header>
  <img src="logoescola.png" class="logo">
  <h1>Portal do Tutor</h1>
</header>

<!-- LOGIN -->
<div id="login" class="login-box">

  <div class="input-group">
    <label>Usuário</label>
    <input type="text" id="user">
  </div>

  <div class="input-group">
    <label>Senha</label>

    <div class="senha-box">
      <input type="password" id="senha">
      <button class="toggle-senha" type="button" onclick="toggleSenha()">
        Mostrar
      </button>
    </div>
  </div>

  <button class="login" onclick="login()">Entrar</button>

</div>

<!-- PORTAL -->
<div id="portal">

  <h2 id="titulo"></h2>
  <div id="alunos" class="grid"></div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const usuarios = {
 'beatriz m': 'B@villani',
 'sandra': 'S@villani',
 'giuliano': 'G@villani',
 'erica': 'E@villani',
 'celso': 'C@villani',
 'aline a': 'A@villani',
 'mara': 'M@villani',
 'fabiana': 'F@villani',
 'alequissandro': 'A@villani',
 'david': 'D@villani',
 'nivaldo': 'N@villani',
 'beatriz ef': 'B@villani',
 'daniel': 'D@villani',
 'flavio': 'F@villani',
 'cecilia': 'C@villani',
 'aline h': 'A@villani',
 'augusto': 'A@villani',
 'juliana': 'J@villani',
 'ana': 'A@villani',
 'valdo': 'V@villani',
 'luan': 'L@villani',
 'elida': 'E@villani',
 'guilherme': 'G@villani',
 'everton': 'E@villani',
 'gabriel nero': 'G@villani',
 'josi': 'J@villani',
 'edivaldo': 'E@villani',
 'gabriel marques': 'G@villani',
 'marcia': 'M@villani',
 'dener': 'D@villani',
 'monica': 'M@villani',
 'elizier': 'E@villani',
 'fernando': 'F@villani'
};

const mapaTutores = {
  "aline a": "ALINE FABIANA",
  "aline h": "ALINE LONGO",
  "beatriz m": "BEATRIZ M.",
  "giuliano": "GUILHERME",
  "erica": "ÉRICA",
  "celso": "CELSO",
  "sandra": "SANDRA",
  "flavio": "FLÁVIO",
  "david": "DAVID",
  "daniel": "DANIEL",
  "augusto": "AUGUSTO",
  "juliana": "JULIANA",
  "ana": "ANA",
  "valdo": "VALDO",
  "luan": "LUAN",
  "elida": "ÉLIDA",
  "guilherme": "GUILHERME",
  "everton": "EVERTON",
  "fernando": "FERNANDO",
  "fabiana": "FABI",
  "marcia": "MÁRCIA",
  "monica": "MÔNICA",
  "dener": "DENER",
  "josi": "JOSI",
  "edivaldo": "EDIVALDO",
  "gabriel nero": "NERO",
  "gabriel marques": "MARQUES",
  "nivaldo": "NIVALDO"
};

function norm(t) {
  return (t || "")
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\./g, "")
    .trim();
}

/* TOGGLE SENHA */
function toggleSenha() {
  const input = document.getElementById("senha");
  input.type = input.type === "password" ? "text" : "password";
}

/* LOGIN */
async function login() {
  const u = norm(document.getElementById("user").value);
  const s = document.getElementById("senha").value;

  if (usuarios[u] && usuarios[u] === s) {

    document.getElementById("login").style.display = "none";
    document.getElementById("portal").style.display = "block";

    document.getElementById("titulo").innerHTML = `
      Tutor: <span class="tutor-chip" onclick="abrirFerramentas()">
      ${u.toUpperCase()}
      </span>
    `;

    document.getElementById("loading").style.display = "flex";

    await carregarAlunos(u);

    document.getElementById("loading").style.display = "none";

  } else {
    alert("Usuário ou senha incorretos");
  }
}

function abrirFerramentas() {
  window.open("https://professorgaldino.github.io/sitetv/ferramentas.html", "_blank");
}

/* CARREGAR */
async function carregarAlunos(loginTutor) {

  const res = await fetch(API);
  const data = await res.json();

  const nomePlanilha = mapaTutores[loginTutor];
  const filtro = norm(nomePlanilha);

  const filtrados = data.filter(a => norm(a.tutor) === filtro);

  const div = document.getElementById("alunos");
  div.innerHTML = "";

  filtrados.forEach(a => {

    const foto = a.foto
      ? "https://lh3.googleusercontent.com/d/" + a.foto
      : "";

    div.innerHTML += `
      <div class="card">
        <img src="${foto}" onerror="this.style.display='none'">
        <h4>${a.nome}</h4>
        <p>${a.sala}</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
